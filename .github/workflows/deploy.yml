name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📦 Checkout kode dari repo
      - name: Checkout kode
        uses: actions/checkout@v4

      # 🐘 Setup PHP (jika pakai PHP di server)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      # 🟢 Install Node.js
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 📁 Buat folder dan input.css secara manual
      - name: Buat file input Tailwind jika belum ada
        run: |
          mkdir -p resources/css
          echo '@tailwind base;\n@tailwind components;\n@tailwind utilities;' > resources/css/input.css

      # 🎨 Install TailwindCSS dan build output.css
      - name: Install TailwindCSS dan Build CSS
        run: |
          npm install -D tailwindcss@3
          npx tailwindcss -i resources/css/input.css -o resources/css/output.css --minify

      # 🚀 Upload ke InfinityFree via FTP
      - name: Deploy ke InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /labsipil.rf.gd/htdocs/
          local-dir: ./